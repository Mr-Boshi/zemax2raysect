# [tool.flakeheaven.plugins]
# "flake8-*" = ["+*"]
# mccabe = ["+*"]
# pyflakes = ["+*", "-F401", "-F841"]
# pycodestyle = ["+*", "-W503", "-E203"]

[tool.ruff]
line-length = 99
target-version = "py39"
extend-exclude = ["build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "W", "B", "C4", "SIM", "UP", "RET", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["E402"]

[tool.ruff.pycodestyle]
max-doc-length = 99

